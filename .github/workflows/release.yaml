name: Publish Package to npmjs
on:
  release:
    types: [published]
jobs:
  publish-webrtc-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn
      - run: yarn build
      - run: yarn pack --out package.tgz
        working-directory: packages/webrtc-client
      - run: npm publish package.tgz --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
        working-directory: packages/webrtc-client

  publish-ts-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn
      - run: yarn build
      - run: yarn pack --out package.tgz
        working-directory: packages/ts-client
      - run: npm publish package.tgz --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
        working-directory: packages/ts-client

  publish-react-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn
      - run: yarn build
      - run: yarn pack --out package.tgz
        working-directory: packages/react-client
      - run: npm publish package.tgz --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
        working-directory: packages/react-client

  publish-mobile-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn
      - run: yarn workspace @fishjam-cloud/react-native-client run check:webrtc-published
      - run: yarn build
      - run: yarn pack --out package.tgz
        working-directory: packages/mobile-client
      - run: npm publish package.tgz --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
        working-directory: packages/mobile-client

  publish-ios-expo-voip:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn
      # The pod depends on FishjamReactNativeWebrtc, so the submodule release must be on npm first.
      - run: yarn workspace @fishjam-cloud/ios-expo-voip run check:webrtc-published
      - run: yarn pack --out package.tgz
        working-directory: packages/ios-expo-voip
      - run: npm publish package.tgz --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
        working-directory: packages/ios-expo-voip
